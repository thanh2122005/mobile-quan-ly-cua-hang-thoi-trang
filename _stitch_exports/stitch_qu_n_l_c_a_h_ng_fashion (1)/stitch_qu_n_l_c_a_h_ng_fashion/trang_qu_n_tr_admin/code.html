<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trang quản trị Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#280056",
                        "primary-container": "#4a148c",
                        "surface-container-low": "#f3f3f3",
                        "on-primary-fixed-variant": "#5a2a9c",
                        "tertiary": "#3f1500",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-secondary-fixed": "#000767",
                        "primary-fixed": "#eddcff",
                        "on-primary-container": "#b889ff",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "secondary-container": "#959efd",
                        "secondary-fixed-dim": "#bdc2ff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-container": "#ff7a2d",
                        "on-tertiary-fixed": "#341100",
                        "divider-gray": "#E0E0E0",
                        "on-surface": "#1a1c1c",
                        "outline": "#7c7483",
                        "inverse-primary": "#d7baff",
                        "error-container": "#ffdad6",
                        "outline-variant": "#cdc3d4",
                        "surface": "#f9f9f9",
                        "surface-tint": "#7345b6",
                        "secondary": "#4c56af",
                        "surface-white": "#FFFFFF",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#4a4452",
                        "tertiary-container": "#612500",
                        "on-secondary-container": "#27308a",
                        "primary-fixed-dim": "#d7baff",
                        "tertiary-fixed": "#ffdbcb",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "surface-container": "#eeeeee",
                        "text-primary": "#212121",
                        "inverse-on-surface": "#f1f1f1",
                        "text-secondary": "#757575",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9f9",
                        "on-secondary-fixed-variant": "#343d96",
                        "accent-amber": "#FFD600",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#dadada",
                        "secondary-fixed": "#e0e0ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb692",
                        "primary": "#310065",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9f9"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-screen": "16dp",
                        "spacing-between-elements": "8dp",
                        "padding-card": "16dp",
                        "gutter-list": "12dp",
                        "unit": "8dp"
                    },
                    fontFamily: {
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"]
                    },
                    fontSize: {
                        "headline-lg": ["28px", { lineHeight: "36px", fontWeight: "700" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.5px", fontWeight: "500" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "headline-sm": ["18px", { lineHeight: "24px", fontWeight: "600" }],
                        "headline-md": ["22px", { lineHeight: "28px", fontWeight: "600" }],
                        "label-lg": ["14px", { lineHeight: "20px", letterSpacing: "0.1px", fontWeight: "600" }]
                    }
                }
            }
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface-white dark:bg-surface-container-low text-primary dark:text-primary-fixed docked full-width top-0 shadow-sm transition-colors duration-200 flex justify-between items-center w-full px-4 h-16 sticky z-40">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container dark:hover:bg-on-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-primary dark:text-primary-fixed">Quản Lý Cửa Hàng</h1>
</div>
<button class="p-2 rounded-full hover:bg-surface-container dark:hover:bg-on-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
</header>
<main class="flex-1 p-margin-screen md:p-8 flex flex-col gap-6 max-w-7xl mx-auto w-full">
<!-- Welcome Section -->
<section class="mb-2">
<h2 class="text-headline-md font-headline-md text-text-primary">Xin chào, Admin 👋</h2>
<p class="text-body-md font-body-md text-text-secondary mt-1">Đây là tổng quan cửa hàng của bạn hôm nay.</p>
</section>
<!-- Stats Bento Grid -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-4">
<!-- Stat Card 1: Total Products -->
<div class="bg-primary-fixed text-on-primary-fixed p-padding-card rounded-xl shadow-sm flex flex-col justify-between h-32 hover:shadow-md transition-shadow">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined opacity-80" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<div>
<p class="text-label-md font-label-md opacity-90 uppercase tracking-wider">Tổng sản phẩm</p>
<p class="text-headline-lg font-headline-lg">22</p>
</div>
</div>
<!-- Stat Card 2: Total Orders -->
<div class="bg-secondary-fixed text-on-secondary-fixed p-padding-card rounded-xl shadow-sm flex flex-col justify-between h-32 hover:shadow-md transition-shadow">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined opacity-80" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
</div>
<div>
<p class="text-label-md font-label-md opacity-90 uppercase tracking-wider">Tổng đơn hàng</p>
<p class="text-headline-lg font-headline-lg">15</p>
</div>
</div>
<!-- Stat Card 3: Revenue -->
<div class="bg-tertiary-fixed text-on-tertiary-fixed p-padding-card rounded-xl shadow-sm flex flex-col justify-between h-32 hover:shadow-md transition-shadow">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined opacity-80" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div>
<p class="text-label-md font-label-md opacity-90 uppercase tracking-wider">Doanh thu</p>
<p class="text-headline-sm font-headline-sm truncate">5.450.000đ</p>
</div>
</div>
<!-- Stat Card 4: Low Stock -->
<div class="bg-error-container text-on-error-container p-padding-card rounded-xl shadow-sm flex flex-col justify-between h-32 hover:shadow-md transition-shadow">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined opacity-80" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div>
<p class="text-label-md font-label-md opacity-90 uppercase tracking-wider">Sắp hết hàng</p>
<p class="text-headline-lg font-headline-lg">3</p>
</div>
</div>
</section>
<!-- Function Grid -->
<section class="mt-4">
<h3 class="text-headline-sm font-headline-sm text-text-primary mb-4">Chức năng quản lý</h3>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
<!-- Function Item 1 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">local_mall</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Quản lý sản phẩm</span>
</button>
<!-- Function Item 2 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">category</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Quản lý danh mục</span>
</button>
<!-- Function Item 3 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">add_shopping_cart</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Tạo hóa đơn</span>
</button>
<!-- Function Item 4 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">history</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Lịch sử hóa đơn</span>
</button>
<!-- Function Item 5 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-primary-fixed-dim flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Thống kê</span>
</button>
<!-- Function Item 6 -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-divider-gray h-32">
<div class="w-12 h-12 rounded-full bg-secondary-fixed-dim flex items-center justify-center text-secondary-container">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary text-center">Quản lý người dùng</span>
</button>
<!-- Function Item 7 (Logout) -->
<button class="bg-surface-white rounded-xl shadow-sm p-4 flex flex-col items-center justify-center gap-3 hover:bg-error-container transition-colors active:scale-95 duration-150 border border-transparent hover:border-error-container h-32 group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-text-secondary group-hover:bg-error-container group-hover:text-error transition-colors">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">logout</span>
</div>
<span class="text-label-lg font-label-lg text-text-primary group-hover:text-error transition-colors text-center">Đăng xuất</span>
</button>
</div>
</section>
</main>
</body></html>
