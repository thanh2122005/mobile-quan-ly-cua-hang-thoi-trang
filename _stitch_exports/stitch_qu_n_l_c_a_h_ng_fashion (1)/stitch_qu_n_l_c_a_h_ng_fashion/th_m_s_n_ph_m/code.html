<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thêm sản phẩm mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#280056",
                        "primary-container": "#4a148c",
                        "surface-container-low": "#f3f3f3",
                        "on-primary-fixed-variant": "#5a2a9c",
                        "tertiary": "#3f1500",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-secondary-fixed": "#000767",
                        "primary-fixed": "#eddcff",
                        "on-primary-container": "#b889ff",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "secondary-container": "#959efd",
                        "secondary-fixed-dim": "#bdc2ff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-container": "#ff7a2d",
                        "on-tertiary-fixed": "#341100",
                        "divider-gray": "#E0E0E0",
                        "on-surface": "#1a1c1c",
                        "outline": "#7c7483",
                        "inverse-primary": "#d7baff",
                        "error-container": "#ffdad6",
                        "outline-variant": "#cdc3d4",
                        "surface": "#f9f9f9",
                        "surface-tint": "#7345b6",
                        "secondary": "#4c56af",
                        "surface-white": "#FFFFFF",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#4a4452",
                        "tertiary-container": "#612500",
                        "on-secondary-container": "#27308a",
                        "primary-fixed-dim": "#d7baff",
                        "tertiary-fixed": "#ffdbcb",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "surface-container": "#eeeeee",
                        "text-primary": "#212121",
                        "inverse-on-surface": "#f1f1f1",
                        "text-secondary": "#757575",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9f9",
                        "on-secondary-fixed-variant": "#343d96",
                        "accent-amber": "#FFD600",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#dadada",
                        "secondary-fixed": "#e0e0ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb692",
                        "primary": "#310065",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9f9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-screen": "16dp",
                        "spacing-between-elements": "8dp",
                        "padding-card": "16dp",
                        "gutter-list": "12dp",
                        "unit": "8dp"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F5F5F5; /* Base Layer */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom scrollbar for better look on web while maintaining mobile feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E0E0E0;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #BDBDBD;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased pb-24 md:pb-8 flex flex-col min-h-screen">
<!-- TopAppBar Semantic Shell -->
<header class="bg-surface-white dark:bg-surface-container-low docked full-width top-0 shadow-sm transition-colors duration-200 z-40 sticky">
<div class="flex justify-between items-center w-full px-4 h-16">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container dark:hover:bg-on-surface-variant transition-colors text-on-surface-variant dark:text-outline active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-primary dark:text-primary-fixed flex-1 ml-2 text-center mr-10">Thêm sản phẩm</h1>
<!-- Empty div for flex balance since we don't have trailing icon here per prompt intent (transactional page) -->
<div class="w-10"></div>
</div>
</header>
<main class="flex-1 w-full max-w-3xl mx-auto p-margin-screen md:py-8 space-y-6">
<!-- Image Upload Section (Bento Grid Style) -->
<section class="bg-surface-white rounded-xl shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-1px_rgba(0,0,0,0.06)] p-padding-card flex flex-col items-center justify-center border border-divider-gray/50 min-h-[200px] cursor-pointer hover:bg-surface-container-lowest transition-colors group relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-sm relative z-10">
<span class="material-symbols-outlined text-outline text-3xl" style="font-variation-settings: 'FILL' 0;">photo_camera</span>
</div>
<p class="text-body-lg font-body-lg text-text-primary font-medium relative z-10">Tải ảnh lên</p>
<p class="text-label-md font-label-md text-text-secondary mt-1 relative z-10">Kéo thả hoặc nhấp để chọn ảnh</p>
<p class="text-[10px] text-outline mt-2 relative z-10">Hỗ trợ: JPG, PNG (Max 5MB)</p>
</section>
<!-- Form Inputs Section -->
<section class="bg-surface-white rounded-xl shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-1px_rgba(0,0,0,0.06)] p-padding-card border border-divider-gray/50 space-y-unit">
<h2 class="text-label-lg font-label-lg text-primary mb-4">Thông tin cơ bản</h2>
<div class="space-y-4">
<!-- Tên sản phẩm -->
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="product-name">Tên sản phẩm *</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/60" id="product-name" placeholder="Nhập tên sản phẩm (VD: Áo thun nam basic)" type="text"/>
</div>
<!-- Danh mục (Dropdown) -->
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="category">Danh mục *</label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent appearance-none transition-all cursor-pointer" id="category">
<option disabled="" selected="" value="">Chọn danh mục</option>
<option value="ao-thun">Áo thun</option>
<option value="ao-so-mi">Áo sơ mi</option>
<option value="quan-jean">Quần Jean</option>
<option value="quan-tay">Quần Tây</option>
<option value="phu-kien">Phụ kiện</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
</div>
<!-- Giá & Số lượng (Grid) -->
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="price">Giá bán (VND) *</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/60" id="price" placeholder="0" type="number"/>
</div>
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="quantity">Số lượng *</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/60" id="quantity" min="0" placeholder="0" type="number"/>
</div>
</div>
<!-- Màu sắc -->
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="color">Màu sắc</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline/60" id="color" placeholder="VD: Trắng, Đen, Xanh navy" type="text"/>
</div>
<!-- Mô tả -->
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-1 ml-1" for="description">Mô tả sản phẩm</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none placeholder:text-outline/60" id="description" placeholder="Nhập mô tả chi tiết về chất liệu, kiểu dáng, hướng dẫn sử dụng..." rows="4"></textarea>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar (Fixed on mobile, sticky on desktop) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-white border-t border-divider-gray p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] md:static md:bg-transparent md:border-none md:shadow-none md:max-w-3xl md:mx-auto md:p-margin-screen flex gap-4 z-50">
<button class="flex-1 px-6 py-3 bg-surface-variant text-on-surface-variant rounded-lg text-label-lg font-label-lg border border-outline-variant hover:bg-surface-container-high transition-colors active:scale-[0.98]" type="button">
            Hủy
        </button>
<button class="flex-[2] px-6 py-3 bg-[#FF6D00] text-on-primary rounded-lg text-label-lg font-label-lg shadow-md hover:bg-[#E65100] transition-colors active:scale-[0.98] flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">save</span>
            Lưu sản phẩm
        </button>
</div>
</body></html>
