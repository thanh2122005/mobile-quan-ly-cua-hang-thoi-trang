<style>
        .gradient-bg {
            background: linear-gradient(135deg, #310065 0%, #4c56af 100%);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="gradient-bg min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md text-on-primary select-none">
<!-- Ambient background effects -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed opacity-10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed opacity-10 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="z-10 flex flex-col items-center w-full px-margin-screen">
<!-- Logo Area -->
<div class="mb-8 flex flex-col items-center transform transition-transform duration-1000 translate-y-0 hover:scale-105">
<div class="w-32 h-32 bg-surface-white/10 backdrop-blur-md rounded-[32px] flex items-center justify-center mb-6 shadow-2xl border border-surface-white/20">
<span class="material-symbols-outlined text-[64px] text-surface-white drop-shadow-md" style="font-variation-settings: 'FILL' 1;">
                    checkroom
                </span>
</div>
<!-- Branding Typography -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-surface-white tracking-tight mb-2 text-center drop-shadow-sm">
                Quản Lý Cửa Hàng Quần Áo
            </h1>
<p class="font-body-lg text-body-lg text-primary-fixed-dim text-center opacity-90">
                Mua sắm dễ dàng - Quản lý nhanh chóng
            </p>
</div>
</main>
<!-- Loading Status Anchor -->
<div class="absolute bottom-10 left-0 w-full flex flex-col items-center z-10">
<div class="flex items-center space-x-2 animate-pulse-slow">
<span class="w-2 h-2 rounded-full bg-surface-white opacity-70"></span>
<span class="w-2 h-2 rounded-full bg-surface-white opacity-70" style="animation-delay: 0.2s;"></span>
<span class="w-2 h-2 rounded-full bg-surface-white opacity-70" style="animation-delay: 0.4s;"></span>
</div>
<p class="mt-4 font-label-md text-label-md text-surface-variant uppercase tracking-widest opacity-80">
            Đang khởi động...
        </p>
</div>
<script>
        // Simple ambient entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
