<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký tài khoản - Luxe Retailer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#1b0600",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#e16415",
                        "primary-container": "#310065",

                        "surface-container-low": "#f3f3f3",
                        "tertiary-fixed": "#ffdbcb",
                        "on-primary-fixed": "#290056",
                        "primary-fixed": "#eddcff",
                        "on-primary-container": "#9d77d5",
                        "surface-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "secondary-container": "#97a1ff",
                        "on-background": "#1a1c1c",
                        "on-secondary-fixed": "#000865",
                        "inverse-surface": "#2f3131",
                        "secondary-fixed-dim": "#bdc2ff",
                        "on-tertiary-fixed": "#341000",
                        "on-surface": "#1a1c1c",
                        "outline": "#7c7482",
                        "inverse-primary": "#d7baff",
                        "error-container": "#ffdad6",
                        "surface": "#f9f9f9",
                        "surface-tint": "#704ba6",
                        "outline-variant": "#ccc3d2",
                        "on-secondary-container": "#29338c",
                        "primary-fixed-dim": "#d7baff",
                        "on-surface-variant": "#4a4451",
                        "tertiary-container": "#3f1500",
                        "surface-white": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary": "#4c56af",
                        "surface-container": "#eeeeee",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "surface-container-highest": "#e2e2e2",
                        "inverse-on-surface": "#f1f1f1",
                        "accent-amber": "#ffd600",
                        "surface-bright": "#f9f9f9",
                        "on-secondary-fixed-variant": "#333d95",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "primary": "#14002f",
                        "tertiary-fixed-dim": "#ffb693",
                        "secondary-fixed": "#dfe0ff",
                        "error": "#ba1a1a",
                        "surface-dim": "#dadada",
                        "background": "#f9f9f9",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-screen": "1.5rem",
                        "spacing-between-elements": "0.5rem",
                        "padding-card": "1rem",
                        "gutter-list": "0.75rem",
                        "unit": "0.5rem"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom styles for Android OutlinedTextField look */
        .outlined-input-wrapper {
            position: relative;
            margin-top: 8px;
        }
        .outlined-input {
            width: 100%;
            padding: 16px 16px;
            border: 1px solid var(--tw-colors-outline);
            border-radius: 4px; /* Material Design standard */
            background-color: transparent;
            color: var(--tw-colors-on-surface);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, border-width 0.2s;
        }
        .outlined-input:focus {
            border-color: var(--tw-colors-primary);
            border-width: 2px;
            padding: 15px 15px; /* Adjust padding to prevent jumping when border thickens */
        }
        .outlined-label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--tw-colors-surface-white);
            padding: 0 4px;
            color: var(--tw-colors-on-surface-variant);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        .outlined-input:focus ~ .outlined-label,
        .outlined-input:not(:placeholder-shown) ~ .outlined-label {
            top: 0;
            font-size: 12px;
            color: var(--tw-colors-primary);
        }
        .outlined-input:not(:focus):not(:placeholder-shown) ~ .outlined-label {
            color: var(--tw-colors-on-surface-variant);
        }
        /* Hide default placeholder so custom label works */
        .outlined-input::placeholder {
            color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-white text-on-surface font-body-md min-h-screen flex justify-center selection:bg-primary-container selection:text-on-primary-container">
<!-- Mobile Container -->
<main class="w-full max-w-[428px] min-h-screen flex flex-col relative overflow-hidden bg-surface-white shadow-[0_0_60px_rgba(0,0,0,0.05)] md:my-8 md:min-h-[auto] md:rounded-[3rem]">
<!-- Ambient Background Glows -->
<div class="absolute top-[-10%] right-[-10%] w-[80%] h-[40%] bg-tertiary-fixed rounded-full blur-[80px] opacity-40 pointer-events-none z-0"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[40%] bg-primary-fixed rounded-full blur-[60px] opacity-30 pointer-events-none z-0"></div>
<!-- TopAppBar (Transactional - Hidden Navigation Shell, keeping only back button logic if needed, but styling as standalone header) -->
<header class="flex justify-between items-center w-full px-margin-screen h-16 relative z-10">
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Content Canvas -->
<div class="flex-1 px-margin-screen py-8 flex flex-col relative z-10 overflow-y-auto">
<!-- Header Section -->
<div class="mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2 tracking-tight">Đăng ký tài khoản</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tạo tài khoản để mua sắm dễ dàng hơn và nhận những ưu đãi đặc quyền.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="outlined-input-wrapper">
<input class="outlined-input" id="fullname" placeholder="Họ và tên" required="" type="text"/>
<label class="outlined-label font-body-md" for="fullname">Họ và tên</label>
</div>
<!-- Email Field -->
<div class="outlined-input-wrapper">
<input class="outlined-input" id="email" placeholder="Email" required="" type="email"/>
<label class="outlined-label font-body-md" for="email">Email</label>
</div>
<!-- Phone Number Field -->
<div class="outlined-input-wrapper">
<input class="outlined-input" id="phone" placeholder="Số điện thoại" required="" type="tel"/>
<label class="outlined-label font-body-md" for="phone">Số điện thoại</label>
</div>
<!-- Password Field -->
<div class="outlined-input-wrapper">
<input class="outlined-input pr-12" id="password" placeholder="Mật khẩu" required="" type="password"/>
<label class="outlined-label font-body-md" for="password">Mật khẩu</label>
<button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant focus:outline-none" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Confirm Password Field -->
<div class="outlined-input-wrapper">
<input class="outlined-input pr-12" id="confirm_password" placeholder="Xác nhận mật khẩu" required="" type="password"/>
<label class="outlined-label font-body-md" for="confirm_password">Xác nhận mật khẩu</label>
<button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant focus:outline-none" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Terms and Conditions Checkbox -->
<div class="flex items-start gap-3 mt-2">
<input class="mt-1 w-5 h-5 rounded border-outline text-on-tertiary-container focus:ring-on-tertiary-container" id="terms" required="" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                        Tôi đồng ý với <a class="text-primary font-medium hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-primary font-medium hover:underline" href="#">Chính sách bảo mật</a>
</label>
</div>
<!-- Primary Button CTA -->
<button class="w-full h-[56px] mt-6 bg-on-tertiary-container text-on-tertiary font-label-lg text-label-lg rounded-full shadow-[0_8px_20px_rgba(225,100,21,0.25)] hover:scale-[0.98] transition-transform duration-200 active:scale-95 flex items-center justify-center" type="submit">
                    Đăng ký
                </button>
</form>
<!-- Footer Link -->
<div class="mt-10 mb-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="text-primary font-medium hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
<!-- Social Login Alternative (Optional polish) -->
<div class="mt-auto pt-8 border-t border-surface-variant">
<p class="text-center font-label-md text-label-md text-on-surface-variant mb-6 uppercase tracking-wider">Hoặc đăng ký bằng</p>
<div class="flex justify-center gap-4">
<button class="w-14 h-14 rounded-full border border-surface-variant bg-surface-white flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm">
<!-- Generic Google Icon placeholder using simple styling -->
<span class="font-bold text-lg" style="color: #DB4437;">G</span>
</button>
<button class="w-14 h-14 rounded-full border border-surface-variant bg-surface-white flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm">
<!-- Generic Facebook Icon placeholder -->
<span class="font-bold text-lg" style="color: #4267B2;">f</span>
</button>
</div>
</div>
</div>
</main>
<script>
        // Simple password toggle logic
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const iconSpan = input.nextElementSibling.nextElementSibling.querySelector('.material-symbols-outlined');
            
            if (input.type === 'password') {
                input.type = 'text';
                iconSpan.textContent = 'visibility_off';
                iconSpan.setAttribute('data-icon', 'visibility_off');
            } else {
                input.type = 'password';
                iconSpan.textContent = 'visibility';
                iconSpan.setAttribute('data-icon', 'visibility');
            }
        }
    </script>
</body></html>
