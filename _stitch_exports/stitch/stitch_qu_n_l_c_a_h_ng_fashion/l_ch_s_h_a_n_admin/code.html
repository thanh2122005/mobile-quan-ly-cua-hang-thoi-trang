</button>

</div>

<button class="snap-start shrink-0 h-9 px-5 rounded-full bg-primary text-on-primary font-label-lg text-label-lg shadow-[0_4px_12px_rgba(20,0,47,0.15)] transition-transform hover:scale-105 active:scale-95">Hôm nay</button>
<button class="snap-start shrink-0 h-9 px-5 rounded-full bg-surface-container-low text-on-surface-variant border border-outline-variant font-label-lg text-label-lg hover:bg-surface-variant transition-colors active:scale-95">Tuần này</button>

</div>
