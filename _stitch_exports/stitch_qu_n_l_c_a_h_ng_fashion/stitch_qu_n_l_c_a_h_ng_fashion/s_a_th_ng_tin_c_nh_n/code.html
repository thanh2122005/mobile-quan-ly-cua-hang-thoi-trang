<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sửa thông tin cá nhân - Luxe Retailer</title>

                            "accent-amber": "#ffd600",
                            "primary-fixed": "#eddcff",
                            "surface-variant": "#e2e2e2",
                            "secondary-fixed": "#dfe0ff",
                            "tertiary-container": "#3f1500",
                            "surface-container-low": "#f3f3f3",
                            "outline": "#7c7482",
                            "tertiary-fixed-dim": "#ffb693",
                            "inverse-primary": "#d7baff",
                            "surface-container-high": "#e8e8e8",
                            "error-container": "#ffdad6",
                            "on-tertiary-fixed": "#341000",
                            "surface-white": "#ffffff",
                            "on-tertiary": "#ffffff",
                            "on-secondary": "#ffffff",
                            "on-error-container": "#93000a",
                            "background": "#f9f9f9",
                            "surface-dim": "#dadada",
                            "on-tertiary-container": "#ff7a2d",

                    },
                    "borderRadius": {
                            "DEFAULT": "1rem",

                    },
                    "spacing": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Ambient Background Blur */
        .ambient-blur {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(237, 220, 255, 0.4) 0%, rgba(249, 249, 249, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }
        
        .ambient-blur-2 {
            position: fixed;
            bottom: 0%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            max-width: 400px;
            max-height: 400px;
            background: radial-gradient(circle, rgba(255, 219, 203, 0.3) 0%, rgba(249, 249, 249, 0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        /* TextInputLayout Style Customization */
        .text-input-layout {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .text-input-layout input {
            width: 100%;
            padding: 1rem 1rem 0.5rem 1rem;
            border: 1px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.DEFAULT');
            background-color: theme('colors.surface-white');
            color: theme('colors.on-surface');
            font-family: theme('fontFamily.body-lg');
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .text-input-layout input:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(20, 0, 47, 0.1);
        }
        .text-input-layout label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: theme('colors.on-surface-variant');
            font-family: theme('fontFamily.body-md');
            font-size: 14px;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        .text-input-layout input:focus + label,
        .text-input-layout input:not(:placeholder-shown) + label {
            top: 0.5rem;
            font-size: 12px;
            color: theme('colors.primary');
            transform: translateY(0);
        }
        .text-input-layout input:not(:placeholder-shown):not(:focus) + label {
            color: theme('colors.on-surface-variant');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-surface antialiased flex justify-center">
<div class="ambient-blur"></div>
<div class="ambient-blur-2"></div>
<!-- Main Mobile Container -->
<main class="w-full max-w-[428px] min-h-screen bg-transparent flex flex-col relative pb-24 shadow-[0_0_50px_rgba(0,0,0,0.03)] sm:bg-surface-white sm:border-x border-outline-variant/30">
<!-- TopAppBar (Transactional - Hidden BottomNav context) -->
<header class="flex justify-between items-center w-full px-margin-screen h-16 bg-surface/80 backdrop-blur-md shadow-sm sticky top-0 z-50 transition-transform duration-200" id="topAppBar">
<button aria-label="Go back" class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 p-2 rounded-full -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary absolute left-1/2 transform -translate-x-1/2">Sửa thông tin cá nhân</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Content Canvas -->
<div class="flex-1 px-margin-screen pt-8 pb-4 flex flex-col items-center">
<!-- Avatar Section -->
<div class="relative mb-10 group cursor-pointer">
<div class="w-32 h-32 rounded-full overflow-hidden shadow-[0_8px_30px_rgba(0,0,0,0.08)] border-4 border-surface-white">
<img alt="User Avatar" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" data-alt="A portrait of a confident young woman with a clear complexion, wearing minimal elegant makeup and a neutral colored top. She is positioned against a clean, softly lit bright studio background. The lighting is high-key and flattering, emphasizing a modern, fresh, and approachable look fitting for a premium lifestyle app profile picture. The overall color palette is warm and natural, harmonizing with a clean white UI aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgLO9t8owkaC6GUxnXQnL_cR9Z3BlthdCyYMd_ccco-hkxnGNR-0g6-8KiTHFYZi1z3ohOjXopNpcoiHBVHzrnAYktC-ie9Y52zGXlwYEYseEnZ3M-ThdSbu8-7e2YV_x4xK3SNFRN7eOYeEtKhxatDPtjp-LP6eP0pj_Q7Rb0nXTOqQLaJF40cfS24E120bJg186D0lGpbELkA6Y1Vk11xwlcf7P8jmRk7nbI8-EI7l_sY1cr-CwpWg"/>
</div>
<!-- Edit Icon Badge -->
<div class="absolute bottom-0 right-0 bg-primary-container text-on-primary-container w-10 h-10 rounded-full flex items-center justify-center shadow-lg border-2 border-surface-white transform translate-x-1/4 translate-y-1/4 group-hover:bg-primary transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</div>
</div>
<!-- Form Section -->
<div class="w-full flex flex-col gap-2">
<!-- Full Name -->
<div class="text-input-layout">
<input class="pt-6 pb-2" id="fullname" placeholder=" " type="text" value="Nguyễn Văn A"/>
<label for="fullname">Họ và tên</label>
</div>
<!-- Email -->
<div class="text-input-layout">
<input class="pt-6 pb-2" id="email" placeholder=" " type="email" value="nguyenvana@example.com"/>
<label for="email">Email</label>
</div>
<!-- Phone -->
<div class="text-input-layout">
<input class="pt-6 pb-2" id="phone" placeholder=" " type="tel" value="0901234567"/>
<label for="phone">Số điện thoại</label>
</div>
<!-- Address -->
<div class="text-input-layout">
<input class="pt-6 pb-2" id="address" placeholder=" " type="text" value="123 Đường Lê Lợi, Quận 1, TP.HCM"/>
<label for="address">Địa chỉ</label>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4 mt-8">
<button class="w-full h-[56px] bg-on-tertiary-container text-surface-white font-label-lg text-label-lg rounded-full shadow-[0_8px_24px_rgba(255,122,45,0.3)] hover:bg-tertiary-container hover:shadow-[0_4px_12px_rgba(255,122,45,0.2)] transition-all duration-200 flex items-center justify-center">
                    Lưu thay đổi
                </button>
<button class="w-full h-[48px] bg-transparent text-on-surface-variant font-label-lg text-label-lg rounded-full hover:bg-surface-container-low transition-colors duration-200 flex items-center justify-center">
                    Hủy
                </button>
</div>
</div>
</main>
<script>
        // Simple top bar hide/show on scroll for a more native feel
        let lastScrollTop = 0;
        const topAppBar = document.getElementById('topAppBar');
        
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 64) {
                // Scroll down
                topAppBar.style.transform = 'translateY(-100%)';
            } else {
                // Scroll up
                topAppBar.style.transform = 'translateY(0)';
            }
            lastScrollTop = scrollTop;
        });
    </script>
</body></html>
