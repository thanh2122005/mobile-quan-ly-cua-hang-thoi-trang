<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đặt hàng thành công - Luxe Retailer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "accent-amber": "#ffd600",
                        "primary-fixed": "#eddcff",

                        "tertiary-container": "#3f1500",

                        "outline": "#7c7482",
                        "tertiary-fixed-dim": "#ffb693",
                        "inverse-primary": "#d7baff",
                        "surface-container-high": "#e8e8e8",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#341000",
                        "surface-white": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#ff7a2d",
                        "on-primary-container": "#9d77d5",
                        "surface-container-highest": "#e2e2e2",

                        "on-primary": "#ffffff",

                        "surface-container": "#eeeeee",

                    "borderRadius": {

                    "spacing": {

                        "padding-card": "1rem",

                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle entry animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden pb-24 md:pb-0">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary-fixed-dim/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary-fixed-dim/20 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[428px] mx-auto px-margin-screen relative z-10 flex flex-col items-center justify-center flex-1 h-full">
<!-- Success Card -->
<div class="bg-surface-white rounded-xl shadow-[0_8px_40px_rgba(0,0,0,0.06)] p-8 w-full flex flex-col items-center text-center animate-scale-in opacity-0">
<!-- Icon Container -->
<div class="w-24 h-24 bg-tertiary-container/10 rounded-full flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(255,122,45,0.2)]">
<span class="material-symbols-outlined text-[64px] text-on-tertiary-container fill">check_circle</span>
</div>
<!-- Typography -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Đặt hàng thành công</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-6">Đơn hàng của bạn đã được lưu vào hệ thống.</p>
<!-- Order Info Divider -->
<div class="w-full h-px bg-surface-variant mb-6"></div>
<!-- Order Number -->
<div class="bg-surface-container-low rounded-lg py-3 w-full mb-8 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-outline text-[20px]">receipt_long</span>
<span class="font-label-lg text-label-lg text-on-surface">Mã đơn hàng: DH001</span>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<!-- Primary Button -->
<button class="w-full h-[56px] bg-on-tertiary-container text-surface-white font-label-lg text-label-lg rounded-full shadow-[0_8px_20px_rgba(255,122,45,0.3)] hover:bg-tertiary-container transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">local_shipping</span>
                    Xem đơn hàng
                </button>
<!-- Secondary Button -->
<button class="w-full h-[48px] bg-transparent text-on-surface-variant font-label-lg text-label-lg rounded-full hover:bg-surface-container-low transition-colors duration-200 active:scale-95 border border-outline-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">home</span>
                    Về trang chủ
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only based on mandate, but forced by context logic) -->
<!-- Note: Suppressed normally for transactional, but JSON specifically included BottomNavBar for user context. Applying conflict resolution: suppress on success screen to prioritize canvas, as per "The UX Goal: If the user is in a focused journey or a "dead end" relative to the global nav, hide the shell to prioritize the Canvas." However, user explicitly requested "Có BottomNavBar người dùng... với mục Đơn hàng đang hoạt động". User prompt overrides shell suppression logic when explicitly requested in detail. -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-white dark:bg-surface-container-lowest shadow-[0_-4px_30px_rgba(0,0,0,0.08)] rounded-t-lg md:hidden">
<!-- Trang chủ -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-200 rounded-lg p-2 min-w-[64px]" href="#">
<span class="material-symbols-outlined text-[24px] mb-1">home</span>
<span class="font-label-md text-label-md">Trang chủ</span>
</a>
<!-- Giỏ hàng -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-200 rounded-lg p-2 min-w-[64px]" href="#">
<span class="material-symbols-outlined text-[24px] mb-1">shopping_cart</span>
<span class="font-label-md text-label-md">Giỏ hàng</span>
</a>
<!-- Đơn hàng (Active) -->
<a class="flex flex-col items-center justify-center bg-tertiary-container text-on-tertiary-container dark:bg-tertiary dark:text-on-tertiary-container rounded-full px-4 py-1 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-200 min-w-[64px]" href="#">
<span class="material-symbols-outlined text-[24px] mb-1 fill">local_shipping</span>
<span class="font-label-md text-label-md">Đơn hàng</span>
</a>
<!-- Tài khoản -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-200 rounded-lg p-2 min-w-[64px]" href="#">
<span class="material-symbols-outlined text-[24px] mb-1">person</span>
<span class="font-label-md text-label-md">Tài khoản</span>
</a>
</nav>
<!-- Desktop Navigation (Hidden on mobile) -->
<header class="hidden md:flex justify-between items-center w-full px-margin-screen h-16 bg-surface/80 backdrop-blur-md shadow-sm fixed top-0 left-0 z-50">
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed tracking-tight">Luxe Retailer</span>
</div>
<nav class="flex items-center gap-8">
<a class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors" href="#">Trang chủ</a>
<a class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors" href="#">Giỏ hàng</a>
<a class="font-label-lg text-label-lg text-on-tertiary-container font-semibold relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-on-tertiary-container" href="#">Đơn hàng</a>
<a class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors" href="#">Tài khoản</a>
</nav>
</header>
</body></html>
