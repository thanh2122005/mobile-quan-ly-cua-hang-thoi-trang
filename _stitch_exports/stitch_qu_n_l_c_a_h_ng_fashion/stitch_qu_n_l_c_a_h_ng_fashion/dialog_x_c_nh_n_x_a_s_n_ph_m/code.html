<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Delete Confirmation Dialog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "tertiary-fixed": "#ffdbcb",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary-container": "#310065",
                        "tertiary": "#1b0600",
                        "secondary": "#4c56af",
                        "on-primary-fixed-variant": "#58328c",
                        "accent-amber": "#ffd600",
                        "primary-fixed": "#eddcff",
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed": "#dfe0ff",
                        "tertiary-container": "#3f1500",
                        "surface-container-low": "#f3f3f3",
                        "outline": "#7c7482",
                        "tertiary-fixed-dim": "#ffb693",
                        "inverse-primary": "#d7baff",
                        "surface-container-high": "#e8e8e8",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#341000",
                        "surface-white": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#ff7a2d",
                        "on-primary-container": "#9d77d5",
                        "surface-container-highest": "#e2e2e2",
                        "on-surface-variant": "#4a4451",
                        "on-secondary-fixed-variant": "#333d95",
                        "on-primary-fixed": "#290056",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#d7baff",
                        "surface-container": "#eeeeee",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "outline-variant": "#ccc3d2",
                        "surface-bright": "#f9f9f9",
                        "primary": "#14002f",
                        "surface-tint": "#704ba6",
                        "on-secondary-container": "#29338c",
                        "on-background": "#1a1c1c",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary-fixed": "#000865",
                        "secondary-container": "#97a1ff",
                        "surface": "#f9f9f9",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "0.5rem",
                        "padding-card": "1rem",
                        "gutter-list": "0.75rem",
                        "spacing-between-elements": "0.5rem",
                        "margin-screen": "1.5rem"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-on-background">
<!-- Ambient background elements to simulate a "blank screen" but with some depth -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-surface-variant rounded-full mix-blend-multiply filter blur-[80px] opacity-30"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-[80px] opacity-20"></div>
</div>
<!-- Scrim / Backdrop (The blurred background behind the dialog) -->
<div aria-hidden="true" class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40 transition-opacity duration-300"></div>
<!-- Dialog Container -->
<div aria-describedby="dialog-description" aria-labelledby="dialog-title" aria-modal="true" class="relative z-50 w-[90%] max-w-[340px] bg-surface-white rounded-[28px] shadow-[0_8px_40px_rgba(0,0,0,0.12)] flex flex-col p-6 transform transition-all duration-300 scale-100 opacity-100" role="dialog">
<!-- Icon Area (Optional for Material 3 Dialogs, but adds visual interest) -->
<div class="flex justify-center mb-4 text-error">
<span class="material-symbols-outlined text-[32px] fill">warning</span>
</div>
<!-- Title -->
<h2 class="font-headline-sm text-headline-sm text-on-surface text-center mb-4" id="dialog-title">
            Xóa sản phẩm
        </h2>
<!-- Content -->
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-6" id="dialog-description">
            Bạn có chắc chắn muốn xóa sản phẩm này không?
        </p>
<!-- Actions -->
<div class="flex justify-end gap-2 mt-auto">
<!-- Cancel Button -->
<button class="px-4 py-2.5 min-h-[40px] rounded-full text-primary font-label-lg text-label-lg hover:bg-surface-container-low transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="button">
                Hủy
            </button>
<!-- Delete Button (Destructive Action) -->
<button class="px-4 py-2.5 min-h-[40px] rounded-full bg-error text-on-error font-label-lg text-label-lg shadow-sm shadow-error/20 hover:bg-on-error-container hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2" type="button">
                Xóa
            </button>
</div>
</div>
</body></html>
