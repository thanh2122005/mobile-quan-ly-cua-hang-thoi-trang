<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luxe Retailer - Đổi mật khẩu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "tertiary-fixed": "#ffdbcb",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary-container": "#310065",
                        "tertiary": "#1b0600",
                        "secondary": "#4c56af",
                        "on-primary-fixed-variant": "#58328c",
                        "accent-amber": "#ffd600",
                        "primary-fixed": "#eddcff",
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed": "#dfe0ff",
                        "tertiary-container": "#3f1500",
                        "surface-container-low": "#f3f3f3",
                        "outline": "#7c7482",
                        "tertiary-fixed-dim": "#ffb693",
                        "inverse-primary": "#d7baff",
                        "surface-container-high": "#e8e8e8",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#341000",
                        "surface-white": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#ff7a2d",
                        "on-primary-container": "#9d77d5",
                        "surface-container-highest": "#e2e2e2",
                        "on-surface-variant": "#4a4451",
                        "on-secondary-fixed-variant": "#333d95",
                        "on-primary-fixed": "#290056",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#d7baff",
                        "surface-container": "#eeeeee",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "outline-variant": "#ccc3d2",
                        "surface-bright": "#f9f9f9",
                        "primary": "#14002f",
                        "surface-tint": "#704ba6",
                        "on-secondary-container": "#29338c",
                        "on-background": "#1a1c1c",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary-fixed": "#000865",
                        "secondary-container": "#97a1ff",
                        "surface": "#f9f9f9",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "0.5rem",
                        "padding-card": "1rem",
                        "gutter-list": "0.75rem",
                        "spacing-between-elements": "0.5rem",
                        "margin-screen": "1.5rem"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle ambient glow for background */
        .ambient-glow {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 50% 30%, rgba(255,122,45,0.03) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Input field animations */
        .input-group:focus-within label {
            color: theme('colors.primary');
            transform: translateY(-8px) scale(0.85);
        }
        
        /* Tinted shadow for primary button */
        .shadow-tint-orange {
            box-shadow: 0 8px 24px -6px rgba(255,122,45, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased overflow-x-hidden">
<div class="ambient-glow"></div>
<!-- Mobile Container (Max 428px width for web preview centering) -->
<main class="mx-auto max-w-[428px] bg-surface min-h-screen flex flex-col relative shadow-[0_0_40px_rgba(0,0,0,0.05)] md:my-8 md:min-h-[850px] md:rounded-[2.5rem] md:overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-screen h-16 bg-surface/80 backdrop-blur-md shadow-sm docked full-width top-0 z-40 sticky">
<button aria-label="Quay lại" class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary absolute left-1/2 -translate-x-1/2 whitespace-nowrap">Đổi mật khẩu</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Content Area -->
<div class="flex-1 px-margin-screen pt-8 pb-12 flex flex-col">
<div class="mb-10 text-center">
<div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_4px_30px_rgba(0,0,0,0.03)]">
<span class="material-symbols-outlined text-4xl text-on-tertiary-container" data-icon="lock_reset" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h2 class="font-headline-md text-headline-md mb-2">Bảo mật tài khoản</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Tạo mật khẩu mới mạnh mẽ để bảo vệ tài khoản của bạn.</p>
</div>
<!-- Form Card -->
<form class="bg-surface-white rounded-xl p-padding-card shadow-[0_8px_30px_rgba(0,0,0,0.04)] flex flex-col gap-6 mb-auto relative z-10 border border-surface-container-low/50">
<!-- Current Password -->
<div class="input-group relative">
<label class="absolute left-4 top-3 text-on-surface-variant transition-all duration-200 pointer-events-none font-body-md text-body-md origin-left" for="current_password">Mật khẩu hiện tại</label>
<input class="w-full pt-6 pb-2 px-4 bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg transition-colors duration-200 font-body-lg text-body-lg text-on-surface" id="current_password" placeholder=" " type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors p-1" onclick="togglePassword('current_password', 'icon_current')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="icon_current">visibility_off</span>
</button>
</div>
<!-- New Password -->
<div class="input-group relative">
<label class="absolute left-4 top-3 text-on-surface-variant transition-all duration-200 pointer-events-none font-body-md text-body-md origin-left" for="new_password">Mật khẩu mới</label>
<input class="w-full pt-6 pb-2 px-4 bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg transition-colors duration-200 font-body-lg text-body-lg text-on-surface" id="new_password" placeholder=" " type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors p-1" onclick="togglePassword('new_password', 'icon_new')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="icon_new">visibility_off</span>
</button>
<!-- Simple strength indicator -->
<div class="flex gap-1 mt-2 px-2">
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden"><div class="h-full w-0 bg-error transition-all duration-300" id="strength_1"></div></div>
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden"><div class="h-full w-0 bg-accent-amber transition-all duration-300" id="strength_2"></div></div>
<div class="h-1 w-full bg-surface-variant rounded-full overflow-hidden"><div class="h-full w-0 bg-[#34c759] transition-all duration-300" id="strength_3"></div></div>
</div>
</div>
<!-- Confirm New Password -->
<div class="input-group relative">
<label class="absolute left-4 top-3 text-on-surface-variant transition-all duration-200 pointer-events-none font-body-md text-body-md origin-left" for="confirm_password">Xác nhận mật khẩu mới</label>
<input class="w-full pt-6 pb-2 px-4 bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-lg transition-colors duration-200 font-body-lg text-body-lg text-on-surface" id="confirm_password" placeholder=" " type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors p-1" onclick="togglePassword('confirm_password', 'icon_confirm')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="icon_confirm">visibility_off</span>
</button>
</div>
</form>
<!-- Bottom Action Area -->
<div class="mt-8 pt-4">
<button class="w-full h-14 bg-on-tertiary-container text-surface-white font-label-lg text-label-lg rounded-full shadow-tint-orange flex items-center justify-center gap-2 hover:scale-[0.98] active:scale-95 transition-all duration-200" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
                    Cập nhật mật khẩu
                </button>
<div class="mt-6 text-center">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">Quên mật khẩu hiện tại?</a>
</div>
</div>
</div>
</main>
<script>
        // Password visibility toggle logic
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        // Floating label logic for pre-filled or dynamically filled inputs
        const inputs = document.querySelectorAll('input[type="password"], input[type="text"]');
        inputs.forEach(input => {
            // Setup initial state
            if(input.value.trim() !== '') {
                input.parentElement.classList.add('has-value');
            }
            
            input.addEventListener('input', (e) => {
                const group = e.target.parentElement;
                const label = group.querySelector('label');
                
                if (e.target.value.trim() !== '') {
                    // Force label up
                    label.style.transform = 'translateY(-8px) scale(0.85)';
                    label.style.color = 'var(--tw-colors-primary)';
                } else if (document.activeElement !== input) {
                    // Reset label if empty and not focused
                    label.style.transform = '';
                    label.style.color = '';
                }
            });

            input.addEventListener('blur', (e) => {
                const group = e.target.parentElement;
                const label = group.querySelector('label');
                if (e.target.value.trim() === '') {
                    label.style.transform = '';
                    label.style.color = '';
                } else {
                    label.style.color = 'var(--tw-colors-on-surface-variant)';
                }
            });
        });

        // Simple password strength simulation for visual demonstration
        const newPasswordInput = document.getElementById('new_password');
        const s1 = document.getElementById('strength_1');
        const s2 = document.getElementById('strength_2');
        const s3 = document.getElementById('strength_3');

        newPasswordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if(val.length === 0) {
                s1.style.width = '0%'; s2.style.width = '0%'; s3.style.width = '0%';
            } else if (val.length < 5) {
                s1.style.width = '100%'; s2.style.width = '0%'; s3.style.width = '0%';
            } else if (val.length < 8) {
                s1.style.width = '100%'; s2.style.width = '100%'; s3.style.width = '0%';
            } else {
                s1.style.width = '100%'; s2.style.width = '100%'; s3.style.width = '100%';
            }
        });
    </script>
</body></html>
