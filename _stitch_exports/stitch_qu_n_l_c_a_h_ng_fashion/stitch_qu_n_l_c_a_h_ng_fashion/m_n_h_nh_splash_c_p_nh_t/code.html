<style>
        .gradient-bg {
            background: linear-gradient(135deg, #14002f 0%, #29338c 100%);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="gradient-bg min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md text-surface-white select-none">
<!-- Ambient background effects -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed opacity-10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed opacity-10 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="z-10 flex flex-col items-center w-full px-margin-screen">
<!-- Logo Area -->
<div class="mb-8 flex flex-col items-center transform transition-transform duration-1000 translate-y-0 hover:scale-105">
<div class="w-40 h-40 bg-surface-white/10 backdrop-blur-md rounded-[40px] flex items-center justify-center mb-8 shadow-2xl border border-surface-white/20">
<span class="material-symbols-outlined text-[80px] text-surface-white drop-shadow-md" style="font-variation-settings: 'FILL' 1;">
                    checkroom
                </span>
</div>
<!-- Branding Typography -->
<h1 class="font-headline-lg-mobile text-[28px] leading-[36px] font-bold md:font-headline-lg md:text-[36px] md:leading-[44px] text-surface-white tracking-tight mb-3 text-center drop-shadow-lg px-4">
                Quản Lý Cửa Hàng Quần Áo
            </h1>
<p class="font-body-lg text-body-lg text-primary-fixed text-center opacity-90 drop-shadow-md">
                Mua sắm dễ dàng - Quản lý nhanh chóng
            </p>
</div>
</main>
<!-- Loading Status Anchor -->
<div class="absolute bottom-12 left-0 w-full flex flex-col items-center z-10">
<div class="flex items-center space-x-3 animate-pulse-slow">
<span class="w-2.5 h-2.5 rounded-full bg-surface-white opacity-90 shadow-sm"></span>
<span class="w-2.5 h-2.5 rounded-full bg-surface-white opacity-90 shadow-sm" style="animation-delay: 0.2s;"></span>
<span class="w-2.5 h-2.5 rounded-full bg-surface-white opacity-90 shadow-sm" style="animation-delay: 0.4s;"></span>
</div>
<p class="mt-5 font-label-md text-[13px] text-primary-fixed uppercase tracking-[0.2em] font-semibold opacity-90 drop-shadow-sm">
            Đang khởi động...
        </p>
</div>
<script>
        // Simple ambient entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
