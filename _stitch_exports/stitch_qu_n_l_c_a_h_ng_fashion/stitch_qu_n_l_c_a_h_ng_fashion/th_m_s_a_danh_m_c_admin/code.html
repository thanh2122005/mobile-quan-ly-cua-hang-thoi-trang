<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thêm danh mục - Luxe Retailer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "tertiary-fixed": "#ffdbcb",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary-container": "#310065",
                        "tertiary": "#1b0600",
                        "secondary": "#4c56af",
                        "on-primary-fixed-variant": "#58328c",
                        "accent-amber": "#ffd600",
                        "primary-fixed": "#eddcff",
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed": "#dfe0ff",
                        "tertiary-container": "#3f1500",
                        "surface-container-low": "#f3f3f3",
                        "outline": "#7c7482",
                        "tertiary-fixed-dim": "#ffb693",
                        "inverse-primary": "#d7baff",
                        "surface-container-high": "#e8e8e8",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#341000",
                        "surface-white": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-tertiary-container": "#ff7a2d",
                        "on-primary-container": "#9d77d5",
                        "surface-container-highest": "#e2e2e2",
                        "on-surface-variant": "#4a4451",
                        "on-secondary-fixed-variant": "#333d95",
                        "on-primary-fixed": "#290056",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#d7baff",
                        "surface-container": "#eeeeee",
                        "on-tertiary-fixed-variant": "#7a3000",
                        "outline-variant": "#ccc3d2",
                        "surface-bright": "#f9f9f9",
                        "primary": "#14002f",
                        "surface-tint": "#704ba6",
                        "on-secondary-container": "#29338c",
                        "on-background": "#1a1c1c",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary-fixed": "#000865",
                        "secondary-container": "#97a1ff",
                        "surface": "#f9f9f9",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "0.5rem",
                        "padding-card": "1rem",
                        "gutter-list": "0.75rem",
                        "spacing-between-elements": "0.5rem",
                        "margin-screen": "1.5rem"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply bg-surface-white/70 backdrop-blur-md border border-surface-white/20;
            }
            .ambient-shadow {
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
            }
            .tinted-shadow-orange {
                box-shadow: 0 8px 24px -4px rgba(255, 122, 45, 0.4);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-x-hidden antialiased">
<!-- Background Ambient Glows -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-fixed-dim/30 rounded-full blur-[80px]"></div>
<div class="absolute bottom-20 -left-20 w-80 h-80 bg-secondary-fixed-dim/20 rounded-full blur-[60px]"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[428px] mx-auto min-h-screen bg-surface-white/40 flex flex-col pb-24 shadow-2xl">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-screen h-16 bg-surface/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200 text-on-surface-variant">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface text-center flex-1 pr-10">Thêm danh mục</h1>
</header>
<!-- Content Canvas -->
<div class="px-margin-screen py-6 flex flex-col gap-6 flex-1">
<!-- Image/Icon Upload Card -->
<div class="glass-effect rounded-lg ambient-shadow p-6 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-surface-white/90 transition-colors group">
<div class="w-24 h-24 rounded-full bg-surface-container-low flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 0;">add_photo_alternate</span>
</div>
<div class="text-center">
<p class="font-label-lg text-label-lg text-primary">Tải lên ảnh danh mục</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Hỗ trợ JPG, PNG (Tối đa 5MB)</p>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-spacing-between-elements">
<label class="font-label-lg text-label-lg text-on-surface pl-1" for="categoryName">Tên danh mục</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-white border border-outline-variant rounded-full focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md outline-none transition-shadow ambient-shadow" id="categoryName" placeholder="Nhập tên danh mục..." type="text"/>
</div>
</div>
<!-- Action Buttons (Fixed to Bottom inside Container) -->
<div class="mt-auto pt-8 flex flex-col gap-4">
<button class="w-full h-14 bg-on-tertiary-container text-surface-white rounded-full font-label-lg text-label-lg tinted-shadow-orange hover:bg-[#e66a20] active:scale-[0.98] transition-all duration-200">
                    Lưu danh mục
                </button>
<button class="w-full h-12 bg-transparent text-on-surface-variant rounded-full font-label-lg text-label-lg hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200">
                    Hủy
                </button>
</div>
</div>
</main>
<script>
        // Simple micro-interaction for the upload card
        const uploadCard = document.querySelector('.glass-effect.cursor-pointer');
        uploadCard.addEventListener('click', () => {
            uploadCard.style.transform = 'scale(0.97)';
            setTimeout(() => {
                uploadCard.style.transform = 'scale(1)';
            }, 150);
        });
    </script>
</body></html>
